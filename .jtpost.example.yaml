# jtpost configuration example.
# Скопируйте этот файл в .jtpost.yaml и настройте под свой проект.
# Все значения можно переопределить переменными окружения с префиксом JTPOST_,
# например JTPOST_POSTS_DIR, JTPOST_TELEGRAM_BOT_TOKEN, JTPOST_AUTH_TENANT_DEFAULT.

posts_dir: content/posts
templates_dir: templates

# Хранилище постов: fs (файловая система) | sqlite | postgres.
# Git-decorator активен только при storage.type=fs && storage.git.enabled=true.
storage:
  type: fs
  git:
    enabled: false              # включить git auto-commit над posts_dir
    auto_commit: true           # коммитить после Create/Update/Delete
    auto_push: false             # push в storage.git.remote после каждого commit
    remote: ""                   # SSH (git@github.com:user/posts.git) или HTTPS URL
    branch: main                 # ветка для initial-инициализации
    # Доступные переменные: .Slug .Title .ID .Status .Operation .Time
    commit_template: "chore: {{.Operation}} post {{.Slug}}"
    # Auth для push:
    #   - SSH: ssh-agent (запустить eval $(ssh-agent) и ssh-add ~/.ssh/id_*)
    #   - HTTPS: env GIT_HTTPS_TOKEN=<personal-access-token>
    # Author identity:
    #   - env GIT_AUTHOR_NAME / GIT_AUTHOR_EMAIL → fallback jtpost <bot@jtpost.local>
  sqlite:
    dsn: .jtpost.db
  postgres:
    # Пример DSN: postgres://user:password@localhost:5432/jtpost?sslmode=disable
    # Когда задан и storage.type=postgres, миграции применяются автоматически при старте.
    dsn: ""
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 30m

# Аутентификация и multi-tenant scope.
# tenant_default / author_default — UUIDv7 идентификаторы, генерируются командой `jtpost init`.
auth:
  type: none  # none | basic | oauth | token
  secret: ""
  tenant_default: 01900000-0000-7000-8000-000000000001
  author_default: 01900000-0000-7000-8000-000000000002
  token_ttl: 24h
  # oauth:
  #   provider: github
  #   client_id: ""
  #   client_secret: ""
  #   redirect_url: ""

# Фоновый воркер для отложенных публикаций.
worker:
  enabled: false
  interval: 1m
  max_retries: 3
  retry_backoff: 30s

# Встроенный HTTP-сервер (jtpost serve).
server:
  addr: localhost
  port: 8080
  base_url: ""
  read_timeout: 15s
  write_timeout: 15s

# Telegram bot для публикаций.
telegram:
  bot_token: 1234567890:ABCDEFGHIJKLMNOPQRSTUVWXYZABCDEFGHI
  chat_id: -1009999999999

defaults:
  status: idea
  platforms: [telegram]  # зарезервировано для будущих платформ
