version: 2

project_name: jtpost

before:
  hooks:
    - go mod tidy

builds:
  - id: jtpost
    main: ./cmd/jtpost
    binary: jtpost
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/jtprogru/jtpost/cmd.Version={{.Version}} -X github.com/jtprogru/jtpost/cmd.Commit={{.Commit}} -X github.com/jtprogru/jtpost/cmd.Date={{.CommitDate}}

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - LICENSE*
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

# Multi-arch Docker-образы публикуются в GHCR.
# Workflow логинится в ghcr.io через GITHUB_TOKEN, поэтому отдельный секрет не нужен.
dockers:
  - id: jtpost-amd64
    image_templates:
      - "ghcr.io/jtprogru/jtpost:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
  - id: jtpost-arm64
    image_templates:
      - "ghcr.io/jtprogru/jtpost:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile.goreleaser
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"

docker_manifests:
  - name_template: "ghcr.io/jtprogru/jtpost:{{ .Version }}"
    image_templates:
      - "ghcr.io/jtprogru/jtpost:{{ .Version }}-amd64"
      - "ghcr.io/jtprogru/jtpost:{{ .Version }}-arm64"
  - name_template: "ghcr.io/jtprogru/jtpost:latest"
    skip_push: auto
    image_templates:
      - "ghcr.io/jtprogru/jtpost:{{ .Version }}-amd64"
      - "ghcr.io/jtprogru/jtpost:{{ .Version }}-arm64"

# Подпись checksums.txt GPG-ключом.
# Требует секретов GPG_PRIVATE_KEY и PASSPHRASE,
# импортированных в gpg перед запуском goreleaser.
signs:
  - id: checksums
    cmd: gpg
    artifacts: checksum
    args:
      - "--batch"
      - "--pinentry-mode=loopback"
      - "--passphrase"
      - "{{ .Env.PASSPHRASE }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# Публикация формулы Homebrew в jtprogru/homebrew-tap.
# Требует HOMEBREW_TAP_GITHUB_TOKEN — PAT с contents:write на jtprogru/homebrew-tap.
brews:
  - name: jtpost
    repository:
      owner: jtprogru
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "brew: jtpost {{ .Tag }}"
    homepage: "https://github.com/jtprogru/jtpost"
    description: "CLI/web-сервис для управления публикациями в Telegram-канал."
    license: "MIT"
    skip_upload: auto
    test: |
      system "#{bin}/jtpost", "version"
    install: |
      bin.install "jtpost"

release:
  prerelease: auto
  draft: false
