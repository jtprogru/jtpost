<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>jtpost — Управление постами</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Tailwind v4 Play CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- htmx для динамических запросов -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <style>
    /* Дополнительные мелкие правки, которых нет в Tailwind */
    th.sortable {
      position: relative;
      padding-right: 1.5rem;
      user-select: none;
      cursor: pointer;
    }
    th.sortable::after {
      content: "⇅";
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      color: #9ca3af;
    }
    th.sortable.asc::after {
      content: "↑";
      color: #3b82f6;
    }
    th.sortable.desc::after {
      content: "↓";
      color: #3b82f6;
    }
    /* Стили для модального окна */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active {
      display: flex;
    }
    /* Стили для статусов */
    .status-badge-idea { background-color: #f1f5f9; color: #475569; }
    .status-badge-draft { background-color: #fef3c7; color: #92400e; }
    .status-badge-ready { background-color: #dbeafe; color: #1e40af; }
    .status-badge-scheduled { background-color: #f3e8ff; color: #6b21a8; }
    .status-badge-published { background-color: #dcfce7; color: #166534; }
  </style>
</head>
<body class="m-0 bg-slate-100 text-slate-900 font-sans">
  <!-- Верхняя панель -->
  <div class="bg-slate-900 text-white px-8 py-3 flex items-center gap-2">
    <span class="text-xl">📝</span>
    <span class="text-lg font-semibold">jtpost — Управление постами</span>
  </div>

  <!-- Ограниченная рабочая область -->
  <main class="px-4 py-6">
    <div class="max-w-6xl mx-auto">
      <!-- Заголовок слева -->
      <h1 class="text-2xl font-semibold mb-6">Управление постами</h1>

      <!-- Блок рекомендуемого поста -->
      <div id="next-post" hx-get="/api/next" hx-trigger="load" hx-swap="innerHTML" class="mb-6">
        <div class="bg-gradient-to-r from-violet-600 to-purple-600 rounded-lg shadow-lg p-5 text-white">
          <h2 class="text-lg font-semibold mb-2">📌 Рекомендуемый пост</h2>
          <p class="text-sm opacity-90">Загрузка...</p>
        </div>
      </div>

      <!-- Горизонтальная статистика -->
      <section id="stats" hx-get="/api/stats" hx-trigger="load" hx-swap="innerHTML" class="flex flex-wrap gap-4 mb-6">
        <div class="bg-white rounded-lg shadow-sm px-5 py-4 min-w-[150px]">
          <div class="text-[11px] uppercase tracking-wide text-slate-500 mb-1">Всего постов</div>
          <div class="text-2xl font-semibold">...</div>
        </div>
      </section>

      <!-- Панель поиска / фильтра / кнопки -->
      <section class="flex flex-wrap items-center gap-3 mb-3">
        <label class="flex items-center gap-2 bg-white border border-slate-300 rounded-md px-3 py-1.5 shadow-sm w-full sm:w-auto sm:flex-1 max-w-md">
          <span class="text-slate-400 text-sm">🔍</span>
          <input
            type="text"
            name="search"
            placeholder="Поиск..."
            class="w-full border-none outline-none text-sm text-slate-700 placeholder:text-slate-400"
            hx-get="/api/posts"
            hx-trigger="keyup changed delay:300ms"
            hx-target="#posts-list"
            hx-swap="innerHTML"
          />
        </label>

        <select
          name="status"
          class="border border-slate-300 rounded-md bg-white text-sm text-slate-700 px-3 py-1.5 shadow-sm"
          hx-get="/api/posts"
          hx-trigger="change"
          hx-target="#posts-list"
          hx-swap="innerHTML"
        >
          <option value="">Все статусы</option>
          <option value="idea">Idea</option>
          <option value="draft">Draft</option>
          <option value="ready">Ready</option>
          <option value="scheduled">Scheduled</option>
          <option value="published">Published</option>
        </select>

        <select
          name="platform"
          class="border border-slate-300 rounded-md bg-white text-sm text-slate-700 px-3 py-1.5 shadow-sm"
          hx-get="/api/posts"
          hx-trigger="change"
          hx-target="#posts-list"
          hx-swap="innerHTML"
        >
          <option value="">Все платформы</option>
          <option value="telegram">Telegram</option>
          <option value="blog">Blog</option>
        </select>

        <button
          class="ml-auto bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-md shadow-sm whitespace-nowrap"
          onclick="openNewPostModal()"
        >
          + Новый пост
        </button>
      </section>

      <!-- Таблица -->
      <section class="bg-white rounded-lg shadow-sm overflow-hidden">
        <table class="w-full border-collapse text-sm">
          <thead class="bg-slate-100">
            <tr>
              <th class="text-left px-3 py-2 font-semibold text-slate-600">Заголовок</th>
              <th
                class="text-left px-3 py-2 font-semibold text-slate-600 sortable"
                data-sort="status"
                onclick="handleSort('status')"
              >Статус</th>
              <th
                class="text-left px-3 py-2 font-semibold text-slate-600 sortable"
                data-sort="platforms"
                onclick="handleSort('platforms')"
              >Платформы</th>
              <th
                class="text-left px-3 py-2 font-semibold text-slate-600 sortable"
                data-sort="tags"
                onclick="handleSort('tags')"
              >Теги</th>
              <th
                class="text-left px-3 py-2 font-semibold text-slate-600 sortable"
                data-sort="deadline"
                onclick="handleSort('deadline')"
              >Дедлайн</th>
              <th class="text-left px-3 py-2 font-semibold text-slate-600">Действия</th>
            </tr>
          </thead>
          <tbody id="posts-list" hx-get="/api/posts" hx-trigger="load" hx-swap="innerHTML">
            <tr><td colspan="6" class="px-3 py-4 text-center text-slate-500">Загрузка...</td></tr>
          </tbody>
        </table>
      </section>
    </div>
  </main>

  <!-- Модальное окно просмотра/редактирования -->
  <div id="post-modal" class="modal">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
      <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
        <h2 id="modal-title" class="text-xl font-semibold">Пост</h2>
        <button class="text-slate-400 hover:text-slate-600 text-2xl" onclick="closePostModal()">&times;</button>
      </div>
      
      <form id="post-form" class="px-6 py-4">
        <input type="hidden" id="post-id"/>
        
        <div class="space-y-4">
          <div>
            <label for="post-title" class="block text-sm font-medium text-slate-700 mb-1">Заголовок</label>
            <input
              type="text"
              id="post-title"
              required
              class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label for="post-slug" class="block text-sm font-medium text-slate-700 mb-1">Slug</label>
            <input
              type="text"
              id="post-slug"
              readonly
              class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm bg-slate-50 text-slate-500"
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="post-status" class="block text-sm font-medium text-slate-700 mb-1">Статус</label>
              <select
                id="post-status"
                class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="idea">Idea</option>
                <option value="draft">Draft</option>
                <option value="ready">Ready</option>
                <option value="scheduled">Scheduled</option>
                <option value="published">Published</option>
              </select>
            </div>

            <div>
              <label for="post-platforms" class="block text-sm font-medium text-slate-700 mb-1">Платформы</label>
              <select
                id="post-platforms"
                multiple
                class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="telegram">Telegram</option>
                <option value="blog">Blog</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="post-deadline" class="block text-sm font-medium text-slate-700 mb-1">Дедлайн</label>
              <input
                type="datetime-local"
                id="post-deadline"
                class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>

            <div>
              <label for="post-scheduled" class="block text-sm font-medium text-slate-700 mb-1">Запланировано</label>
              <input
                type="datetime-local"
                id="post-scheduled"
                class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
          </div>

          <div>
            <label for="post-tags" class="block text-sm font-medium text-slate-700 mb-1">Теги (через запятую)</label>
            <input
              type="text"
              id="post-tags"
              placeholder="golang, cli, devops"
              class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label for="post-content" class="block text-sm font-medium text-slate-700 mb-1">Содержимое (Markdown)</label>
            <textarea
              id="post-content"
              rows="10"
              class="w-full border border-slate-300 rounded-md px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"
            ></textarea>
          </div>

          <!-- Секция публикации -->
          <div id="publish-section" class="border-t border-slate-200 pt-4 mt-4" style="display: none;">
            <h3 class="text-lg font-semibold mb-3">📤 Публикация</h3>
            <div class="space-y-2 mb-3">
              <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" id="publish-telegram" class="rounded border-slate-300" />
                <span>Telegram</span>
              </label>
              <label class="flex items-center gap-2 text-sm">
                <input type="checkbox" id="publish-blog" class="rounded border-slate-300" />
                <span>Blog</span>
              </label>
            </div>
            <button
              type="button"
              class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-md shadow-sm"
              onclick="publishPost()"
            >
              Опубликовать выбранные
            </button>
            <div id="publish-status" class="mt-2 px-3 py-2 rounded-md text-sm hidden"></div>
          </div>
        </div>

        <div class="flex items-center justify-end gap-3 mt-6 pt-4 border-t border-slate-200">
          <button
            type="button"
            class="bg-rose-100 hover:bg-rose-200 text-rose-700 text-sm font-medium px-4 py-2 rounded-md"
            onclick="deletePost()"
          >
            🗑 Удалить
          </button>
          <button
            type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-md shadow-sm"
          >
            Сохранить
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast уведомления -->
  <div id="toast" class="fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium transform transition-all duration-300 translate-y-20 opacity-0 z-2000">
    <span id="toast-message"></span>
  </div>

  <script>
    // Глобальное состояние для сортировки
    let currentSort = { field: null, order: 'asc' };
    let allPosts = [];

    // Рендер статистики
    document.body.addEventListener('htmx:afterSwap', function(evt) {
      if (evt.target.id === 'stats') {
        try {
          var stats = JSON.parse(evt.detail.xhr.responseText);
          evt.target.innerHTML =
            '<div class="bg-white rounded-lg shadow-sm px-5 py-4 min-w-[150px]">' +
            '<div class="text-[11px] uppercase tracking-wide text-slate-500 mb-1">Всего постов</div>' +
            '<div class="text-2xl font-semibold">' + (stats.total || 0) + '</div></div>' +
            '<div class="bg-white rounded-lg shadow-sm px-5 py-4 min-w-[150px]">' +
            '<div class="text-[11px] uppercase tracking-wide text-slate-500 mb-1">Draft</div>' +
            '<div class="text-2xl font-semibold">' + ((stats.by_status && stats.by_status.draft) || 0) + '</div></div>' +
            '<div class="bg-white rounded-lg shadow-sm px-5 py-4 min-w-[150px]">' +
            '<div class="text-[11px] uppercase tracking-wide text-slate-500 mb-1">Ready</div>' +
            '<div class="text-2xl font-semibold">' + ((stats.by_status && stats.by_status.ready) || 0) + '</div></div>' +
            '<div class="bg-white rounded-lg shadow-sm px-5 py-4 min-w-[150px]">' +
            '<div class="text-[11px] uppercase tracking-wide text-slate-500 mb-1">Published</div>' +
            '<div class="text-2xl font-semibold">' + ((stats.by_status && stats.by_status.published) || 0) + '</div></div>';
        } catch (e) {
          console.error('Ошибка парсинга статистики:', e);
        }
      }

      if (evt.target.id === 'next-post') {
        try {
          var post = JSON.parse(evt.detail.xhr.responseText);
          if (post.error || !post.id) {
            evt.target.innerHTML =
              '<div class="bg-gradient-to-r from-violet-600 to-purple-600 rounded-lg shadow-lg p-5 text-white">' +
              '<h2 class="text-lg font-semibold mb-2">📌 Рекомендуемый пост</h2>' +
              '<p class="text-sm opacity-90">Нет постов для рекомендации</p></div>';
          } else {
            evt.target.innerHTML =
              '<div class="bg-gradient-to-r from-violet-600 to-purple-600 rounded-lg shadow-lg p-5 text-white">' +
              '<h2 class="text-lg font-semibold mb-2">📌 Рекомендуемый пост</h2>' +
              '<p class="text-sm"><strong>' + escapeHtml(post.title) + '</strong></p>' +
              '<p class="text-xs opacity-90 mt-1">Статус: ' + post.status + ' | Дедлайн: ' + (post.deadline ? formatDate(post.deadline) : 'не установлен') + '</p>' +
              '<a href="#" onclick="openPostModal(\'' + post.id + '\'); return false;" class="inline-block mt-2 text-xs underline hover:no-underline">Открыть пост →</a></div>';
          }
        } catch (e) {
          console.error('Ошибка парсинга рекомендации:', e);
        }
      }

      if (evt.target.id === 'posts-list') {
        try {
          allPosts = JSON.parse(evt.detail.xhr.responseText);
          renderPosts(allPosts);
        } catch (e) {
          console.error('Ошибка парсинга постов:', e);
          evt.target.innerHTML = '<tr><td colspan="6" class="px-3 py-4 text-center text-rose-500">Ошибка загрузки постов</td></tr>';
        }
      }
    });

    // Рендер списка постов
    function renderPosts(posts) {
      // Применяем сортировку
      if (currentSort.field) {
        posts.sort(function(a, b) {
          var aVal = getSortValue(a, currentSort.field);
          var bVal = getSortValue(b, currentSort.field);
          
          if (aVal < bVal) return currentSort.order === 'asc' ? -1 : 1;
          if (aVal > bVal) return currentSort.order === 'asc' ? 1 : -1;
          return 0;
        });
      }

      // Обновляем индикаторы сортировки
      document.querySelectorAll('th.sortable').forEach(function(th) {
        th.classList.remove('asc', 'desc');
        if (th.dataset.sort === currentSort.field) {
          th.classList.add(currentSort.order);
        }
      });

      var tbody = document.getElementById('posts-list');
      
      if (posts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-3 py-4 text-center text-slate-500">Нет постов</td></tr>';
        return;
      }

      var html = '';
      for (var i = 0; i < posts.length; i++) {
        var post = posts[i];
        html += '<tr class="hover:bg-slate-50">' +
          '<td class="px-3 py-3">' +
          '<div class="font-medium text-slate-900">' + escapeHtml(post.title) + '</div>' +
          '<div class="text-xs text-slate-500">' + escapeHtml(post.slug) + '</div>' +
          '</td>' +
          '<td class="px-3 py-3">' +
          '<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-[11px] font-medium ' + getStatusBadgeClass(post.status) + '">' + 
          escapeHtml(post.status) + '</span>' +
          '</td>' +
          '<td class="px-3 py-3 text-slate-700 text-sm">' + (post.platforms ? post.platforms.join(', ') : '-') + '</td>' +
          '<td class="px-3 py-3 text-slate-700 text-sm">' + (post.tags && post.tags.length > 0 ? escapeHtml(post.tags.join(', ')) : '-') + '</td>' +
          '<td class="px-3 py-3 text-slate-500 text-sm">' + (post.deadline ? formatDate(post.deadline) : '-') + '</td>' +
          '<td class="px-3 py-3">' +
          '<div class="flex gap-2">' +
          '<button class="w-7 h-7 inline-flex items-center justify-center rounded bg-sky-100 text-slate-700 text-xs hover:bg-sky-200" title="Редактировать" onclick="openPostModal(\'' + post.id + '\')">✏️</button>' +
          '<button class="w-7 h-7 inline-flex items-center justify-center rounded bg-rose-100 text-slate-700 text-xs hover:bg-rose-200" title="Удалить" onclick="confirmDelete(\'' + post.id + '\')">🗑</button>' +
          (post.status !== 'published' ? '<button class="w-7 h-7 inline-flex items-center justify-center rounded bg-emerald-100 text-slate-700 text-xs hover:bg-emerald-200" title="Опубликовать" onclick="openPublishModal(\'' + post.id + '\')">📨</button>' : '') +
          '</div>' +
          '</td>' +
          '</tr>';
      }
      tbody.innerHTML = html;
    }

    // Получение значения для сортировки
    function getSortValue(post, field) {
      switch (field) {
        case 'status':
          var statusOrder = { 'idea': 0, 'draft': 1, 'ready': 2, 'scheduled': 3, 'published': 4 };
          return statusOrder[post.status] || 999;
        case 'platforms':
          return post.platforms ? post.platforms.join(', ') : '';
        case 'tags':
          return post.tags ? post.tags.join(', ') : '';
        case 'deadline':
          return post.deadline ? new Date(post.deadline).getTime() : 0;
        default:
          return '';
      }
    }

    // Обработчик сортировки
    function handleSort(field) {
      if (currentSort.field === field) {
        currentSort.order = currentSort.order === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.field = field;
        currentSort.order = 'asc';
      }
      renderPosts(allPosts);
    }

    // Получение класса для статуса
    function getStatusBadgeClass(status) {
      var classes = {
        'idea': 'status-badge-idea',
        'draft': 'status-badge-draft',
        'ready': 'status-badge-ready',
        'scheduled': 'status-badge-scheduled',
        'published': 'status-badge-published'
      };
      return classes[status] || 'status-badge-idea';
    }

    // Форматирование даты
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      var date = new Date(dateStr);
      return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // Экранирование HTML
    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Модальное окно
    function openPostModal(id) {
      fetch('/api/posts/' + id)
        .then(function(r) { return r.json(); })
        .then(function(post) {
          document.getElementById('post-id').value = post.id;
          document.getElementById('post-title').value = post.title;
          document.getElementById('post-slug').value = post.slug;
          document.getElementById('post-status').value = post.status;
          
          // Устанавливаем платформы
          var platformsSelect = document.getElementById('post-platforms');
          Array.from(platformsSelect.options).forEach(function(opt) {
            opt.selected = post.platforms && post.platforms.includes(opt.value);
          });
          
          document.getElementById('post-deadline').value = post.deadline ? new Date(post.deadline).toISOString().slice(0, 16) : '';
          document.getElementById('post-scheduled').value = post.scheduled_at ? new Date(post.scheduled_at).toISOString().slice(0, 16) : '';
          document.getElementById('post-tags').value = post.tags ? post.tags.join(', ') : '';
          document.getElementById('post-content').value = post.content || '';
          document.getElementById('modal-title').textContent = 'Редактировать пост';

          // Показываем секцию публикации только для неопубликованных постов
          var publishSection = document.getElementById('publish-section');
          if (post.status !== 'published' && post.external && !post.external.telegram_url) {
            publishSection.style.display = 'block';
            if (post.platforms) {
              document.getElementById('publish-telegram').checked = post.platforms.includes('telegram');
              document.getElementById('publish-blog').checked = post.platforms.includes('blog');
            }
          } else {
            publishSection.style.display = 'none';
          }

          document.getElementById('post-modal').classList.add('active');
        })
        .catch(function(err) {
          showToast('Ошибка загрузки поста: ' + err.message, 'error');
        });
    }

    function openNewPostModal() {
      document.getElementById('post-form').reset();
      document.getElementById('post-id').value = '';
      document.getElementById('modal-title').textContent = 'Новый пост';
      document.getElementById('publish-section').style.display = 'none';
      document.getElementById('post-modal').classList.add('active');
    }

    function closePostModal() {
      document.getElementById('post-modal').classList.remove('active');
      var statusDiv = document.getElementById('publish-status');
      statusDiv.className = 'publish-status mt-2 px-3 py-2 rounded-md text-sm hidden';
      statusDiv.textContent = '';
    }

    // Сохранение поста
    document.getElementById('post-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var id = document.getElementById('post-id').value;
      var tagsStr = document.getElementById('post-tags').value;
      var tags = tagsStr ? tagsStr.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t; }) : [];

      // Получаем выбранные платформы
      var platforms = [];
      var platformsSelect = document.getElementById('post-platforms');
      Array.from(platformsSelect.options).forEach(function(opt) {
        if (opt.selected) platforms.push(opt.value);
      });

      var data = {
        title: document.getElementById('post-title').value,
        slug: document.getElementById('post-slug').value,
        status: document.getElementById('post-status').value,
        platforms: platforms,
        deadline: document.getElementById('post-deadline').value || null,
        scheduled_at: document.getElementById('post-scheduled').value || null,
        tags: tags,
        content: document.getElementById('post-content').value
      };

      var url = id ? '/api/posts/' + id : '/api/posts';
      var method = id ? 'PATCH' : 'POST';

      fetch(url, {
        method: method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      })
      .then(function(r) {
        if (!r.ok) {
          return r.text().then(function(text) { throw new Error(text); });
        }
        return r.json();
      })
      .then(function() {
        closePostModal();
        htmx.trigger('#posts-list', 'load');
        htmx.trigger('#stats', 'load');
        htmx.trigger('#next-post', 'load');
        showToast('Пост успешно сохранён', 'success');
      })
      .catch(function(err) {
        showToast('Ошибка: ' + err.message, 'error');
      });
    });

    // Подтверждение удаления
    function confirmDelete(id) {
      if (confirm('Вы уверены, что хотите удалить этот пост?')) {
        deletePostById(id);
      }
    }

    // Удаление поста
    function deletePost() {
      var id = document.getElementById('post-id').value;
      if (confirm('Удалить пост?')) {
        deletePostById(id);
      }
    }

    function deletePostById(id) {
      fetch('/api/posts/' + id, {method: 'DELETE'})
        .then(function(r) {
          if (!r.ok) {
            return r.text().then(function(text) { throw new Error(text); });
          }
          closePostModal();
          htmx.trigger('#posts-list', 'load');
          htmx.trigger('#stats', 'load');
          htmx.trigger('#next-post', 'load');
          showToast('Пост удалён', 'success');
        })
        .catch(function(err) {
          showToast('Ошибка: ' + err.message, 'error');
        });
    }

    // Открытие модального окна публикации
    function openPublishModal(id) {
      fetch('/api/posts/' + id)
        .then(function(r) { return r.json(); })
        .then(function(post) {
          document.getElementById('post-id').value = post.id;
          document.getElementById('modal-title').textContent = 'Публикация поста';
          
          // Устанавливаем чекбоксы платформ
          if (post.platforms) {
            document.getElementById('publish-telegram').checked = post.platforms.includes('telegram');
            document.getElementById('publish-blog').checked = post.platforms.includes('blog');
          }
          
          // Скрываем форму редактирования, показываем только публикацию
          document.querySelectorAll('#post-form > div > div').forEach(function(div) {
            div.style.display = 'none';
          });
          document.getElementById('publish-section').style.display = 'block';
          document.getElementById('post-modal').classList.add('active');
        })
        .catch(function(err) {
          showToast('Ошибка: ' + err.message, 'error');
        });
    }

    // Публикация поста
    function publishPost() {
      var id = document.getElementById('post-id').value;
      var platforms = [];

      if (document.getElementById('publish-telegram').checked) {
        platforms.push('telegram');
      }
      if (document.getElementById('publish-blog').checked) {
        platforms.push('blog');
      }

      if (platforms.length === 0) {
        showToast('Выберите хотя бы одну платформу для публикации', 'error');
        return;
      }

      var statusDiv = document.getElementById('publish-status');
      statusDiv.className = 'mt-2 px-3 py-2 rounded-md text-sm bg-emerald-100 text-emerald-700';
      statusDiv.textContent = 'Публикация...';

      fetch('/api/posts/' + id + '/publish', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ platforms: platforms })
      })
      .then(function(r) {
        if (!r.ok) {
          return r.text().then(function(text) { throw new Error(text); });
        }
        return r.json();
      })
      .then(function(result) {
        statusDiv.className = 'mt-2 px-3 py-2 rounded-md text-sm bg-emerald-100 text-emerald-700';
        statusDiv.textContent = '✅ Опубликовано в: ' + platforms.join(', ');

        // Обновляем список постов
        setTimeout(function() {
          closePostModal();
          htmx.trigger('#posts-list', 'load');
          htmx.trigger('#stats', 'load');
          htmx.trigger('#next-post', 'load');
          showToast('Пост опубликован', 'success');
        }, 1500);
      })
      .catch(function(err) {
        statusDiv.className = 'mt-2 px-3 py-2 rounded-md text-sm bg-rose-100 text-rose-700';
        statusDiv.textContent = '❌ Ошибка: ' + err.message;
        showToast('Ошибка публикации: ' + err.message, 'error');
      });
    }

    // Toast уведомления
    function showToast(message, type) {
      var toast = document.getElementById('toast');
      var toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      toast.className = 'fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium transform transition-all duration-300 z-2000 ' +
        (type === 'success' ? 'bg-emerald-600' : 'bg-rose-600');
      
      // Показываем
      toast.classList.remove('translate-y-20', 'opacity-0');
      
      // Скрываем через 3 секунды
      setTimeout(function() {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3000);
    }

    // Закрытие модального окна по клику вне
    window.onclick = function(event) {
      var modal = document.getElementById('post-modal');
      if (event.target === modal) {
        closePostModal();
      }
    }

    // Инициализация при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() {
      loadPlatforms();
      loadTags();
    });

    // Загрузка платформ
    function loadPlatforms() {
      fetch('/api/platforms')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var platformsSelect = document.getElementById('post-platforms');
          // Очищаем и заполняем заново
          platformsSelect.innerHTML = '';
          data.platforms.forEach(function(platform) {
            var option = document.createElement('option');
            option.value = platform;
            option.textContent = platform.charAt(0).toUpperCase() + platform.slice(1);
            platformsSelect.appendChild(option);
          });
        })
        .catch(function(err) {
          console.error('Ошибка загрузки платформ:', err);
        });
    }

    // Загрузка тегов
    function loadTags() {
      fetch('/api/tags')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var tagsInput = document.getElementById('post-tags');
          // Сохраняем текущие теги
          var currentTags = tagsInput.value ? tagsInput.value.split(',').map(function(t) { return t.trim(); }) : [];
          
          // Добавляем autocomplete через datalist
          var datalist = document.getElementById('tags-datalist');
          if (!datalist) {
            datalist = document.createElement('datalist');
            datalist.id = 'tags-datalist';
            tagsInput.setAttribute('list', 'tags-datalist');
            tagsInput.parentNode.appendChild(datalist);
          }
          datalist.innerHTML = '';
          data.tags.forEach(function(tag) {
            var option = document.createElement('option');
            option.value = tag;
            datalist.appendChild(option);
          });
        })
        .catch(function(err) {
          console.error('Ошибка загрузки тегов:', err);
        });
    }
  </script>
</body>
</html>
